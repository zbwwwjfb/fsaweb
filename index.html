<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSAE车队云端共享-ERP物料管理</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
        body {background:#f5f7fa;padding:20px;}
        .container {max-width:900px;margin:0 auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 15px rgba(0,0,0,.1);}
        .login-box {text-align:center;margin:80px auto;max-width:300px;}
        .login-box h2 {margin-bottom:20px;color:#333;}
        .login-box input {width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:16px;}
        .login-box button {width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin-top:10px;}
        .header {display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
        .header h1 {color:#333;font-size:22px;}
        .btn {padding:8px 16px;border:none;border-radius:5px;cursor:pointer;font-size:14px;}
        .btn-logout {background:#dc3545;color:#fff;}
        .btn-refresh {background:#28a745;color:#fff;margin-right:10px;}
        .form-grid {display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px;}
        .form-group {display:flex;flex-direction:column;}
        .form-group.full {grid-column:1 / -1;}
        label {font-size:14px;color:#555;margin-bottom:5px;}
        input,select,textarea {padding:10px;border:1px solid #ddd;border-radius:5px;font-size:14px;}
        textarea {resize:vertical;min-height:80px;}
        .btn-save {width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;}
        .btn-save:disabled {background:#6c757d;cursor:not-allowed;}
        .file-info {font-size:12px;color:#666;margin-top:5px;word-break:break-all;}
        .hidden {display:none;}
    </style>
</head>
<body>
    <div id="loginContainer" class="login-box">
        <h2>ERP物料管理系统</h2>
        <input type="text" id="username" placeholder="账号" value="fsae">
        <input type="password" id="password" placeholder="密码" value="123456">
        <button onclick="login()">登录</button>
    </div>

    <div id="mainContainer" class="container hidden">
        <div class="header">
            <h1>FSAE车队云端共享-ERP物料管理</h1>
            <div>
                <button class="btn btn-refresh" onclick="loadData()">刷新最新数据</button>
                <button class="btn btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>
        <div class="form-grid">
            <div class="form-group"><label>物料名称</label><input type="text" id="materialName"></div>
            <div class="form-group"><label>物料单价（元）</label><input type="number" id="materialPrice" step="0.01"></div>
            <div class="form-group"><label>采购人</label><input type="text" id="buyer"></div>
            <div class="form-group">
                <label>物料状态</label>
                <select id="materialStatus">
                    <option value="待收货">待收货</option>
                    <option value="已收货">已收货</option>
                    <option value="已使用">已使用</option>
                    <option value="已报废">已报废</option>
                </select>
            </div>
            <div class="form-group"><label>购买时间</label><input type="datetime-local" id="buyTime"></div>
            <div class="form-group"><label>到货时间</label><input type="datetime-local" id="arriveTime"></div>
            <div class="form-group">
                <label>是否可回收</label>
                <select id="recyclable">
                    <option value="否">否</option>
                    <option value="是">是</option>
                </select>
            </div>
            <div class="form-group"><label>回收金额（元）</label><input type="number" id="recyclePrice" step="0.01" placeholder="无可回收填0" value="0"></div>
            <div class="form-group">
                <label>是否开具发票</label>
                <select id="needInvoice">
                    <option value="否">否</option>
                    <option value="是">是</option>
                </select>
            </div>
            <div class="form-group full"><label>采购备注</label><textarea id="remark" placeholder="填写采购用途、供应商等信息"></textarea></div>
            <div class="form-group full">
                <label>支付凭证图片</label>
                <input type="file" id="proofImage" accept="image/*">
                <div id="fileInfo" class="file-info"></div>
            </div>
        </div>
        <button class="btn-save" id="saveBtn" onclick="saveData()">保存并同步到云端</button>
    </div>

    <script>
        // 换成相对稳定的社区代理
        const PROXY = "https://cors-anywhere.com/";
        const CLOUD_URL = "https://jsonblob.com/api/jsonBlob/1332012452549644288";
        let currentUser = null;

        function login(){
            let u = document.getElementById("username").value;
            let p = document.getElementById("password").value;
            if(u==="fsae"&&p==="123456"){
                currentUser=u;
                document.getElementById("loginContainer").classList.add("hidden");
                document.getElementById("mainContainer").classList.remove("hidden");
                loadData();
            }else{
                alert("账号或密码错误");
            }
        }
        function logout(){
            currentUser=null;
            document.getElementById("loginContainer").classList.remove("hidden");
            document.getElementById("mainContainer").classList.add("hidden");
        }

        async function loadData(){
            try{
                let res = await fetch(PROXY + CLOUD_URL);
                if(!res.ok) throw new Error("加载失败");
                let data = await res.json();
                fillForm(data);
            }catch(e){
                alert("加载云端数据失败，可继续填写后保存");
                console.error(e);
            }
        }
        function fillForm(d){
            document.getElementById("materialName").value = d.materialName||"";
            document.getElementById("materialPrice").value = d.materialPrice||"";
            document.getElementById("buyer").value = d.buyer||"";
            document.getElementById("materialStatus").value = d.materialStatus||"待收货";
            document.getElementById("buyTime").value = d.buyTime||"";
            document.getElementById("arriveTime").value = d.arriveTime||"";
            document.getElementById("recyclable").value = d.recyclable||"否";
            document.getElementById("recyclePrice").value = d.recyclePrice||0;
            document.getElementById("needInvoice").value = d.needInvoice||"否";
            document.getElementById("remark").value = d.remark||"";
            document.getElementById("fileInfo").textContent = d.imageName||"";
        }

        async function saveData(){
            let btn = document.getElementById("saveBtn");
            btn.disabled = true;
            let form = {
                materialName:document.getElementById("materialName").value,
                materialPrice:parseFloat(document.getElementById("materialPrice").value)||0,
                buyer:document.getElementById("buyer").value,
                materialStatus:document.getElementById("materialStatus").value,
                buyTime:document.getElementById("buyTime").value,
                arriveTime:document.getElementById("arriveTime").value,
                recyclable:document.getElementById("recyclable").value,
                recyclePrice:parseFloat(document.getElementById("recyclePrice").value)||0,
                needInvoice:document.getElementById("needInvoice").value,
                remark:document.getElementById("remark").value,
                imageName:document.getElementById("fileInfo").textContent||""
            };
            try{
                await fetch(PROXY + CLOUD_URL,{
                    method:"PUT",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify(form)
                });
                alert("✅ 保存并云端同步成功！队友刷新即可看到");
            }catch(e){
                alert("❌ 同步失败，请稍后重试");
                console.error(e);
            }
            btn.disabled = false;
        }

        document.getElementById("proofImage").addEventListener("change",e=>{
            let f = e.target.files[0];
            if(f) document.getElementById("fileInfo").textContent = f.name;
        });
    </script>
</body>
</html>
