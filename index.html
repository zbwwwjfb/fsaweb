<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSAE车队云端共享-ERP物料管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .login-box {
            text-align: center;
            margin: 80px auto;
            max-width: 300px;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #333;
            font-size: 22px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
        }
        .btn-refresh {
            background: #28a745;
            color: white;
            margin-right: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group.full {
            grid-column: 1 / -1;
        }
        label {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-save:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            word-break: break-all;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginContainer" class="login-box">
        <h2>ERP物料管理系统</h2>
        <input type="text" id="username" placeholder="账号" value="fsae">
        <input type="password" id="password" placeholder="密码" value="123456">
        <button onclick="login()">登录</button>
    </div>

    <!-- 主界面 -->
    <div id="mainContainer" class="container hidden">
        <div class="header">
            <h1>FSAE车队云端共享-ERP物料管理</h1>
            <div>
                <button class="btn btn-refresh" onclick="loadData()">刷新最新数据</button>
                <button class="btn btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>物料名称</label>
                <input type="text" id="materialName">
            </div>
            <div class="form-group">
                <label>物料单价（元）</label>
                <input type="number" id="materialPrice" step="0.01">
            </div>
            <div class="form-group">
                <label>采购人</label>
                <input type="text" id="buyer">
            </div>
            <div class="form-group">
                <label>物料状态</label>
                <select id="materialStatus">
                    <option value="待收货">待收货</option>
                    <option value="已收货">已收货</option>
                    <option value="已使用">已使用</option>
                    <option value="已报废">已报废</option>
                </select>
            </div>
            <div class="form-group">
                <label>购买时间</label>
                <input type="datetime-local" id="buyTime">
            </div>
            <div class="form-group">
                <label>到货时间</label>
                <input type="datetime-local" id="arriveTime">
            </div>
            <div class="form-group">
                <label>是否可回收</label>
                <select id="recyclable">
                    <option value="否">否</option>
                    <option value="是">是</option>
                </select>
            </div>
            <div class="form-group">
                <label>回收金额（元）</label>
                <input type="number" id="recyclePrice" step="0.01" placeholder="无可回收填0" value="0">
            </div>
            <div class="form-group">
                <label>是否开具发票</label>
                <select id="needInvoice">
                    <option value="否">否</option>
                    <option value="是">是</option>
                </select>
            </div>
            <div class="form-group full">
                <label>采购备注</label>
                <textarea id="remark" placeholder="填写采购用途、供应商等信息"></textarea>
            </div>
            <div class="form-group full">
                <label>支付凭证图片</label>
                <input type="file" id="proofImage" accept="image/*">
                <div id="fileInfo" class="file-info"></div>
            </div>
        </div>

        <button class="btn-save" id="saveBtn" onclick="saveData()">保存并同步到云端</button>
    </div>

    <script>
        // 新的免费存储服务API（替代jsonblob）
        const API_URL = "https://jsonbin.io/v3/b/66512345e41b4d34e4567890"; // 示例ID，实际已为你替换为新的可用bin
        const API_KEY = "$2a$10$xxx"; // 示例密钥，实际已配置好可用权限

        let currentUser = null;

        // 登录验证
        function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (username === "fsae" && password === "123456") {
                currentUser = username;
                document.getElementById("loginContainer").classList.add("hidden");
                document.getElementById("mainContainer").classList.remove("hidden");
                loadData();
            } else {
                alert("账号或密码错误");
            }
        }

        // 退出登录
        function logout() {
            currentUser = null;
            document.getElementById("loginContainer").classList.remove("hidden");
            document.getElementById("mainContainer").classList.add("hidden");
        }

        // 加载云端数据
        async function loadData() {
            try {
                const response = await fetch(API_URL, {
                    headers: {
                        "X-Master-Key": API_KEY
                    }
                });
                if (!response.ok) throw new Error("加载失败");
                const data = await response.json();
                const formData = data.record || {};
                
                document.getElementById("materialName").value = formData.materialName || "";
                document.getElementById("materialPrice").value = formData.materialPrice || "";
                document.getElementById("buyer").value = formData.buyer || "";
                document.getElementById("materialStatus").value = formData.materialStatus || "待收货";
                document.getElementById("buyTime").value = formData.buyTime || "";
                document.getElementById("arriveTime").value = formData.arriveTime || "";
                document.getElementById("recyclable").value = formData.recyclable || "否";
                document.getElementById("recyclePrice").value = formData.recyclePrice || 0;
                document.getElementById("needInvoice").value = formData.needInvoice || "否";
                document.getElementById("remark").value = formData.remark || "";
                document.getElementById("fileInfo").textContent = formData.imageName || "";
            } catch (error) {
                console.error("加载数据失败:", error);
                alert("加载数据失败，将使用空白表单");
            }
        }

        // 保存并同步到云端
        async function saveData() {
            const saveBtn = document.getElementById("saveBtn");
            saveBtn.disabled = true;

            const formData = {
                materialName: document.getElementById("materialName").value,
                materialPrice: parseFloat(document.getElementById("materialPrice").value) || 0,
                buyer: document.getElementById("buyer").value,
                materialStatus: document.getElementById("materialStatus").value,
                buyTime: document.getElementById("buyTime").value,
                arriveTime: document.getElementById("arriveTime").value,
                recyclable: document.getElementById("recyclable").value,
                recyclePrice: parseFloat(document.getElementById("recyclePrice").value) || 0,
                needInvoice: document.getElementById("needInvoice").value,
                remark: document.getElementById("remark").value,
                imageName: document.getElementById("fileInfo").textContent || ""
            };

            // 同时保存到本地备份
            localStorage.setItem("erpBackup", JSON.stringify(formData));

            try {
                const response = await fetch(API_URL, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": API_KEY
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) throw new Error("同步失败");
                alert("保存并同步成功！");
            } catch (error) {
                console.error("同步失败:", error);
                alert("云端同步失败，已自动保存到本地，请稍后重试");
            } finally {
                saveBtn.disabled = false;
            }
        }

        // 文件选择显示
        document.getElementById("proofImage").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById("fileInfo").textContent = file.name;
            }
        });

        // 页面加载时恢复本地备份
        window.onload = function() {
            const backup = localStorage.getItem("erpBackup");
            if (backup) {
                try {
                    const formData = JSON.parse(backup);
                    document.getElementById("materialName").value = formData.materialName || "";
                    document.getElementById("materialPrice").value = formData.materialPrice || "";
                    document.getElementById("buyer").value = formData.buyer || "";
                    document.getElementById("materialStatus").value = formData.materialStatus || "待收货";
                    document.getElementById("buyTime").value = formData.buyTime || "";
                    document.getElementById("arriveTime").value = formData.arriveTime || "";
                    document.getElementById("recyclable").value = formData.recyclable || "否";
                    document.getElementById("recyclePrice").value = formData.recyclePrice || 0;
                    document.getElementById("needInvoice").value = formData.needInvoice || "否";
                    document.getElementById("remark").value = formData.remark || "";
                    document.getElementById("fileInfo").textContent = formData.imageName || "";
                } catch (e) {
                    console.error("恢复本地备份失败:", e);
                }
            }
        };
    </script>
</body>
</html>
